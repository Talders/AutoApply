{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="card">

    <h2>Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="button">
            Einloggen
        </button>
    </form>

</div>

<div class="card">

    <p>Noch keinen Account?</p>

    <a href="{% url 'register' %}" class="button">
        Registrieren
    </a>

</div>

{% endblock %}
