{% extends "base.html" %}

{% block title %}
Registrieren
{% endblock %}

{% block content %}

<div class="card">

    <h2>Account erstellen</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="button">
            Registrieren
        </button>
    </form>

</div>

<div class="card">

    <p>Schon einen Account?</p>

    <a href="{% url 'login' %}" class="button">
        Login
    </a>

</div>

{% endblock %}
